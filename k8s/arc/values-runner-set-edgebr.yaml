githubConfigUrl: "https://github.com/edgebr"
githubConfigSecret: github-app-secret-edgebr
runnerScaleSetName: "arc-runner-set"
minRunners: 0
maxRunners: 3

# Enable Docker-in-Docker so runner pods can build container images.
# Adds a dind sidecar with a Docker daemon the runner connects to.
containerMode:
  type: "dind"

template:
  spec:
    serviceAccountName: arc-runner-sa
# Deploy to dedicated namespace (arc-runners-edgebr) to avoid Helm resource
# conflicts with the koder-cat runner set in arc-runners.
controllerServiceAccount:
  namespace: arc-systems
  name: arc-controller
